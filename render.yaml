services:
  - type: web
    name: examcoo-cloud
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    branch: main
    envVars:
      - key: PORT
        value: "8080"
      - key: DATA_DIR
        value: /app/data
    disk:
      name: examcoo-data
      mountPath: /app/data
      sizeGB: 1
